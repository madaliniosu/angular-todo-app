<mat-sidenav-container autosize>
    <mat-sidenav #sidenav [style.width]="sidenavToggle.isCollapsed() ? '80px' : ''" [mode]="sidenavToggle.isMobile() ? 'over' : 'side'" [opened]="sidenavToggle.isMobile() ? sidenavToggle.isOpen() : 'true'">
        <app-nav-buttons ></app-nav-buttons>
    </mat-sidenav>

    <mat-sidenav-content>
        <div class="sidenav-filler-content-outer">
            <div class="sidenav-filler-content-inner">
                <app-todo-table></app-todo-table>
            </div>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
